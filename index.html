<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root">
      <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #050505; color: #D4AF37; font-family: serif; font-style: italic;">
        <h1 style="font-size: 2.5rem; margin-bottom: 1rem; letter-spacing: 0.1em;">PRÉCIS PDF</h1>
        <div style="width: 40px; height: 40px; border: 2px solid rgba(212,175,55,0.2); border-top-color: #D4AF37; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 2rem; font-family: sans-serif; font-style: normal; font-size: 0.8rem; color: #888; letter-spacing: 0.05em; text-transform: uppercase;">Initializing Editor</p>
      </div>
    </div>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
